name: 'Build, Test and Deploy'

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  pull-requests: write
  checks: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install dependencies (pnpm)
        uses: ./.github/actions/pnpm-install

      - name: Lint JavaScript code
        run: pnpm lint

      - name: Lint styles
        run: pnpm lint:styles

  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max_old_space_size=8192'
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install dependencies (pnpm)
        uses: ./.github/actions/pnpm-install

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build all packages
        run: pnpm build:all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-dist
          path: packages/*/dist
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max_old_space_size=8192'
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install dependencies (pnpm)
        uses: ./.github/actions/pnpm-install

      - name: Run unit tests (coverage)
        run: pnpm test:coverage:ci

  storybook:
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: 'core'
            e2e: true
            deploy: true
            chromatic: false
          - project: 'widgets'
            e2e: true
            deploy: true
            chromatic: false
          - project: 'templates'
            # templates does not have e2e tests
            e2e: false
            deploy: false
            chromatic: false
          - project: 'infra-dash'
            e2e: false
            deploy: true
            chromatic: false
    steps:
      - name: Checkout source code (${{ github.ref }})
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (pnpm)
        uses: ./.github/actions/pnpm-install

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: packages

      - name: Install Chromium
        if: ${{ matrix.e2e }}
        run: npx playwright install chromium --with-deps

      - name: Run end-to-end tests
        if: ${{ matrix.e2e }}
        run: pnpm test:${{ matrix.project }}:e2e

      - name: Build Storybook
        if: ${{ matrix.chromatic && github.event_name == 'pull_request' }}
        run: pnpm sb:build:${{ matrix.project }}

      - name: Publish to Chromatic
        if: ${{ matrix.chromatic }}
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: packages/${{ matrix.project }}/storybook-static
          exitZeroOnChanges: true
          skip: ${{ github.event_name != 'pull_request' }}

      # - name: Run visual tests (Lost Pixel)
      #   if: ${{ matrix.e2e }}
      #   uses: lost-pixel/lost-pixel@v3.22.0
      #   env:
      #     LOST_PIXEL_API_KEY: ${{ secrets.LOST_PIXEL_API_KEY }}
      #     LOST_PIXEL_CONFIG_DIR: ./packages/${{ matrix.project }}

      - name: Install firebase tools
        if: ${{ github.ref == 'refs/heads/main' && matrix.deploy }}
        run: npm install -g firebase-tools@14.11.0

      - name: Authenticate with Google Cloud
        if: ${{ github.ref == 'refs/heads/main' && matrix.deploy }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}'

      - name: Deploy Storybook (${{ matrix.project }})
        if: ${{ github.ref == 'refs/heads/main' && matrix.deploy }}
        run: pnpm sb:deploy:${{ matrix.project }}

  # lost-pixel-finalize:
  #   runs-on: ubuntu-latest
  #   needs: storybook
  #   steps:
  #     - name: Checkout source code
  #       uses: actions/checkout@v4
  #
  #     - name: Lost Pixel finalize
  #       uses: lost-pixel/lost-pixel@v3.22.0
  #       env:
  #         LOST_PIXEL_API_KEY: ${{ secrets.LOST_PIXEL_API_KEY }}
  #         # the final step needs to point to any of the monorepo lostpixel.config.js|ts
  #         # https://docs.lost-pixel.com/user-docs/recipes/lost-pixel-platform/monorepo#finalise-action
  #         LOST_PIXEL_CONFIG_DIR: ./packages/core
  #       with:
  #         FINALIZE: true

  deploy-storybook-root:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install dependencies (pnpm)
        uses: ./.github/actions/pnpm-install

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: packages

      - name: Install Vercel CLI
        run: pnpm i -g vercel@latest

      - name: Rename Git folder
        run: mv .git .git2

      - name: Deploy Storybook (root)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TOKEN_OCT2025: ${{ secrets.VERCEL_TOKEN_OCT2025 }}
        run: pnpm sb:deploy:root --token=${{ env.VERCEL_TOKEN_OCT2025 }}

      - name: Rename Git folder back
        run: mv .git2 .git

  deploy-docs:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install dependencies (pnpm)
        uses: ./.github/actions/pnpm-install

      - name: Build all packages
        run: pnpm build:all

      - name: Install Vercel CLI
        run: pnpm i -g vercel@latest

      - name: Deploy docs site
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DOCS_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_DOCS_TOKEN }}
        run: vercel deploy --prod --yes --archive=tgz --token=${{ env.VERCEL_TOKEN }}

  deploy-fitness-dashboard:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install dependencies (pnpm)
        uses: ./.github/actions/pnpm-install

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: packages

      - name: Install firebase tools
        run: npm install -g firebase-tools@14.11.0

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}'

      - name: Deploy fitness dashboard
        run: pnpm deploy:dashboard
